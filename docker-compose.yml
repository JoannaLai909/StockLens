version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: stocklens-db
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/stock_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── ETL（一次性執行，跑完就退出）────────────────────────────────────────────
  etl:
    build: ./etl
    container_name: stocklens-etl
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── FastAPI ───────────────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: stocklens-api
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js ───────────────────────────────────────────────────────────────
  web:
    build: ./frontend
    container_name: stocklens-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # 容器內部 Next.js → api 走內部網路
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata: